<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Time Rush — Watches</title>
  <meta name="description" content="Time Rush — curated watches. Secure demo checkout." />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="#">Time Rush</a>
      <div class="search-cart">
        <input id="search" type="search" placeholder="Search watches..." />
        <button id="cart-toggle" class="btn">Cart (<span id="cart-count">0</span>)</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section id="hero" class="hero">
      <h1>Time Rush</h1>
      <p>Handpicked watches — classic, sport, and chronograph. Demo checkout only.</p>
    </section>

    <section class="controls">
      <label>
        Brand:
        <select id="filter-brand">
          <option value="">All brands</option>
        </select>
      </label>
      <label>
        Sort:
        <select id="sort-by">
          <option value="featured">Featured</option>
          <option value="price-asc">Price: Low → High</option>
          <option value="price-desc">Price: High → Low</option>
        </select>
      </label>
    </section>

    <section id="products" class="grid"></section>

    <template id="product-template">
      <article class="card product">
        <div class="thumb">
          <img src="" alt="" />
        </div>
        <div class="meta">
          <h3 class="product-title"></h3>
          <div class="price"></div>
          <p class="desc"></p>
          <div class="actions">
            <button class="btn add-to-cart">Add to cart</button>
            <button class="btn details">Details</button>
          </div>
        </div>
      </article>
    </template>
  </main>

  <aside id="cart-drawer" class="cart-drawer" aria-hidden="true">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button id="close-cart" class="btn">Close</button>
    </div>
    <div id="cart-items" class="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-summary">
        <div>Subtotal</div>
        <div id="cart-subtotal">0.00</div>
      </div>
      <div class="cart-actions">
        <button id="clear-cart" class="btn">Clear</button>
        <button id="checkout" class="btn primary">Checkout (Demo)</button>
      </div>
      <div id="checkout-message" class="muted small"></div>
    </div>
  </aside>

  <footer class="site-footer">
    <div class="container">
      <small>© <span id="year"></span> Time Rush — Demo Store</small>
    </div>
  </footer>

  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
